version: '3.8'
services:
  app:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
      args:
        NODE_VERSION: 20
    volumes:
      - ./workspace/app:/workspace:delegated
      - /workspace/node_modules
      - .:/project:delegated
      - ~/.gitconfig:/home/node/.gitconfig:ro
      - ${SSH_AUTH_SOCK}:/ssh-agent
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_HOST=db
      - DATABASE_USER=dev
      - DATABASE_PASSWORD=devpass
      - DATABASE_NAME=devdb
      - SSH_AUTH_SOCK=/ssh-agent
      - GIT_CONFIG_COUNT=1
      - GIT_CONFIG_KEY_0=safe.directory
      - GIT_CONFIG_VALUE_0=/project
    command: sleep infinity
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=dev
      - POSTGRES_PASSWORD=devpass
      - POSTGRES_DB=devdb
    volumes:
      - postgres_data:/var/lib/postgresql/data

  spring:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile.spring
    working_dir: /workspace
    volumes:
      - ./workspace/spring:/workspace:delegated
      - ./workspace/.gradle:/root/.gradle
      - ./workspace/.m2:/root/.m2
      - .:/project:delegated
      - ~/.gitconfig:/root/.gitconfig:ro
      - ${SSH_AUTH_SOCK}:/ssh-agent
    command: >-
      bash -lc "if [ -x ./gradlew ]; then chmod +x ./gradlew && ./gradlew bootRun; \
      elif [ -x ./mvnw ]; then chmod +x ./mvnw && ./mvnw spring-boot:run; \
      elif [ -f build.gradle ] || [ -f pom.xml ]; then \
      apt-get update && apt-get install -y --no-install-recommends gradle maven && \
      if command -v gradle >/dev/null 2>&1; then gradle bootRun; else mvn spring-boot:run; fi; \
      else echo 'No Spring project found. Waiting...' && sleep infinity; fi"
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SSH_AUTH_SOCK=/ssh-agent
      - GIT_CONFIG_COUNT=1
      - GIT_CONFIG_KEY_0=safe.directory
      - GIT_CONFIG_VALUE_0=/project
    depends_on:
      - db

volumes:
  postgres_data:
