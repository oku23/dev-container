version: '3.8'
services:
  app:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
      args:
        NODE_VERSION: 20
    volumes:
      - ./workspace/app:/workspace:delegated
      - /workspace/node_modules
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_HOST=db
      - DATABASE_USER=dev
      - DATABASE_PASSWORD=devpass
      - DATABASE_NAME=devdb
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=dev
      - POSTGRES_PASSWORD=devpass
      - POSTGRES_DB=devdb
    volumes:
      - postgres_data:/var/lib/postgresql/data

  spring:
    build:
      context: ./docker/spring
      dockerfile: Dockerfile
    working_dir: /workspace/spring
    volumes:
      - ./workspace/spring:/workspace/spring:delegated
      - ./workspace/.gradle:/home/gradle/.gradle
      - ./workspace/.m2:/root/.m2
    command: ["/bin/sh", "-c", "if command -v gradle >/dev/null 2>&1; then gradle bootRun; elif [ -x ./gradlew ]; then chmod +x ./gradlew && ./gradlew bootRun; else echo 'No gradle or gradlew found'; exit 1; fi"]
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
    depends_on:
      - db

volumes:
  postgres_data:
